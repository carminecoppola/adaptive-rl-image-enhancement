dataset:
  # Supported datasets: "CIFAR10", "STL10"
  name: "CIFAR10"
  image_size: 32
  split: "train"
  train_split: true
  download: true

degradation:
  # Supported degradations:
  # - mixed
  # - gaussian_noise
  # - low_brightness
  # - low_contrast
  # - blur
  # - combined
  type: "mixed"
  candidate_types:
    - "gaussian_noise"
    - "low_brightness"
    - "low_contrast"
    - "blur"
    - "combined"
  noise_std: 0.1
  brightness_factor: 0.6
  contrast_factor: 0.6
  blur_radius: 1.0
