dataset:
  name: "CIFAR10"
  # If omitted, defaults are selected by dataset:
  # CIFAR10 -> 32, STL10 -> 96
  image_size: 32
  # For STL10 valid splits: train, train+unlabeled, unlabeled, test
  split: "train"
  train_split: true
  download: true

degradation:
  type: "mixed"
  candidate_types:
    - "gaussian_noise"
    - "low_brightness"
    - "low_contrast"
    - "blur"
    - "combined"
  noise_std: 0.1
  low_contrast: false
  low_brightness: false
