training:
  algorithm: DDQN
  seed: 42
  num_episodes: 260
  learning_rate: 0.0001
  batch_size: 64
  gamma: 0.99
  use_double_dqn: true
  use_dueling_dqn: false
  buffer_size: 50000
  target_update_every: 5
  eval_every: 10
  num_eval_episodes: 20
  epsilon_start: 1.0
  epsilon_end: 0.08
  epsilon_decay: 0.9985
  max_grad_norm: 10.0
  eval_pool_size: 500
  action_collapse_threshold: 0.7
  min_stop_rate: 0.1
  device: cuda
