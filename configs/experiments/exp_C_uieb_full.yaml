# Experiment C: UIEB Real Underwater Image Enhancement (Full Domain Adaptation)
#
# Purpose: Train agent on real underwater images with all reward components
# and underwater-specific actions for production-ready enhancement
#
# Configuration:
# - Dataset: UIEB (real 890 underwater image pairs, 128x128)
# - Degradation: None (UIEB contains real degraded images)
# - Actions: Full action set including underwater-specific
# - Reward: Full reward stack (PSNR + SSIM + terminal rewards + color cast)
# - Training: 1000 episodes (extensive training on real domain)

# Dataset configuration (real underwater images)
dataset:
  name: "UIEB"
  image_size: 128
  split: "train"
  download: false  # Manual download required (see scripts/download_uieb.sh)

degradation:
  # UIEB already contains degraded underwater images
  # Set to "none" to avoid adding synthetic degradation on top
  type: "none"

# Environment configuration (full action set)
environment:
  max_steps: 5
  include_step_channel: true
  action_space:
    # Standard enhancement actions
    - increase_brightness      # 0
    - decrease_brightness      # 1
    - increase_contrast        # 2
    - decrease_contrast        # 3
    - gaussian_denoise         # 4
    - sharpen                  # 5
    - gamma_up                 # 6
    - gamma_down               # 7
    - stop                     # 8
    # Underwater-specific actions
    - red_channel_boost        # 9 — compensate for red absorption
    - lab_color_balance        # 10 — white balance in LAB space
    - clahe                    # 11 — contrast-limited adaptive histogram eq.
    - saturation_boost         # 12 — restore desaturated colors

# Reward configuration (full reward stack for real underwater domain)
reward:
  use_psnr: true
  use_ssim: false
  step_penalty: 0.011
  repeated_action_penalty: 0.05
  no_improvement_penalty: 0.03
  stop_bonus_scale: 0.3
  stop_no_improvement_penalty: 0.04
  early_stop_min_improvement: 0.01
  truncate_without_stop_penalty: 0.75
  stop_action_bonus: 0.04
  # Terminal rewards enabled for real underwater domain
  terminal_reward_psnr_scale: 1.5
  terminal_reward_ssim_scale: 0.0
  # Color cast reward enabled
  color_cast_weight: 0.15
  color_cast_improvement_scale: 0.5

# Training configuration (extensive training on real data)
training:
  algorithm: DDQN
  use_double_dqn: true
  num_episodes: 1000
  learning_rate: 0.0001
  batch_size: 64
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.08
  epsilon_decay: 0.9985
  memory_size: 10000
  target_update_frequency: 10
  gradient_clip_norm: 1.0
  save_checkpoint_frequency: 50
  log_frequency: 10

# Metadata
metadata:
  name: "exp_C_uieb_full"
  description: "Production domain adaptation: Real UIEB underwater images with full reward stack"
  domain: "real_underwater"
  focus: "Achieve state-of-the-art underwater image enhancement on real data"
  expected_duration_min: "120-150"
  notes: "Final production experiment combining all previous learnings (exp_A baseline + exp_B adaptation)"
  dataset_notes: "UIEB: 890 image pairs, manually downloaded from https://li-chongyi.github.io/proj_benchmark.html"
