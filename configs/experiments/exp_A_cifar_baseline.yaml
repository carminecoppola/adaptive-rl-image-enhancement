# Experiment A: CIFAR-10 Baseline (Standard Image Enhancement)
# 
# Purpose: Establish baseline performance on synthetic images with standard
# image enhancement actions (brightness, contrast, gamma, denoise, sharpen)
#
# Configuration:
# - Dataset: CIFAR-10 (32x32, synthetic, fast)
# - Degradation: Mixed synthetic (gaussian_noise, low_brightness, low_contrast, blur, combined)
# - Actions: Standard enhancement only (no underwater-specific actions)
# - Reward: PSNR-based, no color cast or terminal rewards
# - Training: 300 episodes (quick baseline reference)

# Dataset configuration
dataset:
  name: "CIFAR10"
  image_size: 32
  split: "train"
  download: true

degradation:
  type: "mixed"
  candidate_types:
    - "gaussian_noise"
    - "low_brightness"
    - "low_contrast"
    - "blur"
    - "combined"
  noise_std: 0.1
  brightness_factor: 0.6
  contrast_factor: 0.6
  blur_radius: 1.0

# Environment configuration (standard actions only)
environment:
  max_steps: 5
  include_step_channel: true
  action_space:
    - increase_brightness      # 0
    - decrease_brightness      # 1
    - increase_contrast        # 2
    - decrease_contrast        # 3
    - gaussian_denoise         # 4
    - sharpen                  # 5
    - gamma_up                 # 6
    - gamma_down               # 7
    - stop                     # 8

# Reward configuration (PSNR-only baseline)
reward:
  use_psnr: true
  use_ssim: false
  step_penalty: 0.011
  repeated_action_penalty: 0.05
  no_improvement_penalty: 0.03
  stop_bonus_scale: 0.3
  stop_no_improvement_penalty: 0.04
  early_stop_min_improvement: 0.01
  truncate_without_stop_penalty: 0.75
  stop_action_bonus: 0.04
  terminal_reward_psnr_scale: 1.5
  terminal_reward_ssim_scale: 0.0
  # NO color cast reward for baseline
  color_cast_weight: 0.0

# Training configuration (short baseline)
training:
  algorithm: DDQN
  use_double_dqn: true
  num_episodes: 300
  learning_rate: 0.0001
  batch_size: 64
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.08
  epsilon_decay: 0.9985
  memory_size: 10000
  target_update_frequency: 10
  gradient_clip_norm: 1.0
  save_checkpoint_frequency: 50
  log_frequency: 10
  
# Metadata
metadata:
  name: "exp_A_cifar_baseline"
  description: "Baseline experiment on CIFAR-10 with standard image enhancement actions"
  domain: "synthetic"
  focus: "Establish baseline for domain-agnostic image enhancement"
  expected_duration_min: "15-20"
