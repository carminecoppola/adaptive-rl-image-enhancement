# UIEB Dataset Configuration

dataset:
  name: "uieb"
  description: "Underwater Image Enhancement Benchmark - Paired underwater images"
  
  # Data source
  path: "${UIEB_ROOT}"  # From .env, must point to UIEB root directory
  
  # Preprocessing
  image_size: 128  # Resize to 128×128 for consistency
  channels: 3  # RGB
  paired: true  # Has reference ground truth
  
  # Data splits (deterministic, seed-based)
  train_subset_size: 5000   # Full training set (70% of UIEB)
  eval_subset_size: 500     # Evaluation (used during training for gate checks)
  val_subset_size: 500      # Validation (final evaluation, not used during training)
  split_seed: 42            # Fixed seed for reproducibility
  
  # Augmentation for training
  train_transforms:
    - name: "random_crop"
      size: 128
      prob: 1.0
    - name: "random_flip_h"
      prob: 0.5
  
  # Augmentation for evaluation/validation (no augmentation)
  eval_transforms:
    - name: "center_crop"
      size: 128
  
  # Normalization
  normalize: true
  mean: [0.5, 0.5, 0.5]  # Standard ImageNet-like normalization
  std: [0.5, 0.5, 0.5]
  
  # Data loading
  batch_size: 32  # Can override in training config
  num_workers: 4  # Parallel data loading
  pin_memory: true  # GPU transfer optimization
