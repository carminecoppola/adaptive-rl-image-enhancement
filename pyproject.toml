[tool.pytest.ini_options]
addopts = "-q --tb=short"
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["*.ipynb"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"src/evaluation/analyze_dqn_actions.py" = ["E402"]
"src/evaluation/evaluate_underwater_ood.py" = ["E402"]
"src/evaluation/evaluation_dqn_baselines.py" = ["E402"]
"src/evaluation/generate_underwater_report.py" = ["E402"]
"src/training/train.py" = ["E402"]
"src/training/dqn_run_setup.py" = ["SIM115"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
